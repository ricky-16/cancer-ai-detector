<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Resultado | Christus Muguerza</title>

<style>
:root{
  --blue:#0f4c81;
  --blue2:#0b3a63;
  --teal:#1fa2a6;
  --bg:#f3f6fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --line:#e5e7eb;
  --good:#16a34a;
  --warn:#b91c1c;
  --goodBg:#dcfce7;
  --warnBg:#fee2e2;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:var(--bg);
}

/* Header */
.topbar{
  background:#fff;
  border-bottom:1px solid var(--line);
}
.topbar-inner{
  max-width:1000px;
  margin:auto;
  padding:14px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.brand{
  display:flex;
  align-items:center;
  gap:12px;
}
.brand img{
  width:42px;height:42px;border-radius:12px;
}
.brand .t1{font-weight:900;color:var(--blue2)}
.brand .t2{font-size:12px;color:var(--muted)}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:30px 20px;
}

.card{
  background:var(--card);
  border-radius:20px;
  box-shadow:0 18px 45px rgba(0,0,0,.08);
  overflow:hidden;
}

/* DIAGNOSTICO */
.hero{
  text-align:center;
  padding:40px 20px 30px;
  border-bottom:1px solid var(--line);
}
.hero .cap{
  letter-spacing:.12em;
  font-weight:900;
  color:var(--muted);
  font-size:14px;
}
.hero .dx{
  font-size:44px;
  font-weight:1000;
  margin-top:10px;
  color:#0b1220;
  word-break:break-word;
}
.pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-top:15px;
  padding:10px 18px;
  border-radius:999px;
  font-weight:900;
  border:1px solid;
}

/* RECOMENDACIONES */
.recom{
  padding:30px;
  border-bottom:1px solid var(--line);
}
.recom h3{
  margin:0 0 15px 0;
  font-size:20px;
}
.recom ul{
  margin:0;
  padding-left:20px;
  color:var(--text);
}
.recom li{
  margin-bottom:10px;
}

/* DETALLE */
.details{
  padding:30px;
  display:flex;
  justify-content:center;
}

.details-box{
  width:100%;
  max-width:600px;
  background:#f8fafc;
  border:1px solid var(--line);
  border-radius:16px;
  padding:20px;
}

.details-box h4{
  margin:0 0 15px 0;
  font-size:14px;
  color:var(--muted);
  font-weight:900;
  text-align:center;
}

.row{ margin-bottom:10px; }

.row .top{
  display:flex;
  justify-content:space-between;
  font-size:12px;
}

.barwrap{
  height:5px;
  background:#e8eef7;
  border-radius:999px;
  margin-top:4px;
  overflow:hidden;
}

.bar{
  height:100%;
  background:var(--teal);
}

.bar.top{
  background:var(--blue);
}

.btn{
  margin:20px;
  padding:12px 16px;
  border:none;
  border-radius:12px;
  font-weight:900;
  background:var(--blue);
  color:#fff;
  cursor:pointer;
}
.btn:hover{background:var(--blue2)}

@media (max-width:520px){
  .hero .dx{font-size:32px}
}
</style>
</head>

<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img src="logo.png" alt="Logo">
      <div>
        <div class="t1">Christus Muguerza</div>
        <div class="t2">Resultado del análisis</div>
      </div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="card">

    <div class="hero">
      <div class="cap">DIAGNÓSTICO PRINCIPAL</div>
      <div id="mainDx" class="dx">—</div>
      <div id="pill" class="pill" style="display:none;"></div>
    </div>

    <div class="recom">
      <h3>Recomendaciones</h3>
      <ul id="recommendations"></ul>
    </div>

    <div class="details">
      <div class="details-box">
        <h4>Detalle por clase</h4>
        <div id="list"></div>
      </div>
    </div>

    <div style="text-align:center">
      <button class="btn" onclick="window.location.href='analysis.html'">
        Analizar otra imagen
      </button>
    </div>

  </div>
</div>

<script>
const data = JSON.parse(localStorage.getItem("result_data") || "null");

const mainDx = document.getElementById("mainDx");
const pill = document.getElementById("pill");
const list = document.getElementById("list");
const rec = document.getElementById("recommendations");

function fmt(p){ return (p*100).toFixed(2) + "%"; }

function confidenceLabel(p){
  if(p>=0.85) return "Alta confianza";
  if(p>=0.60) return "Confianza media";
  return "Baja confianza";
}

/* ===== RECOMENDACIONES POR TIPO ===== */
function generateRecommendations(label){
  const L = (label || "").toUpperCase();

  const MAP = {

    BREAST_MALIGNANT: [
      "Valoración urgente con oncología/mastología.",
      "Confirmar con biopsia e imagenología complementaria.",
      "Evaluar extensión mediante estudios indicados.",
      "No retrasar consulta médica especializada."
    ],

    BREAST_BENIGN: [
      "Control con ginecología o mastología.",
      "Seguimiento con ultrasonido o mastografía según edad.",
      "Vigilar cambios en tamaño o síntomas."
    ],

    COLON_ACA: [
      "Consulta prioritaria con gastroenterología.",
      "Confirmación mediante colonoscopia con biopsia.",
      "Evaluar estudios de extensión."
    ],

    COLON_BNT: [
      "Control clínico y seguimiento preventivo.",
      "Colonoscopy de rutina según edad y antecedentes.",
      "Mantener dieta rica en fibra."
    ],

    LUNG_SSC: [
      "Valoración urgente con neumología/oncología.",
      "Confirmación con TAC y posible biopsia.",
      "Suspender tabaco inmediatamente."
    ],

    LUNG_ACA: [
      "Consulta especializada lo antes posible.",
      "Realizar estudios de imagen avanzados.",
      "Evaluación molecular si se confirma diagnóstico."
    ],

    LUNG_BTN: [
      "Seguimiento con neumología.",
      "Control radiológico periódico.",
      "Evaluar antecedentes respiratorios."
    ],

    ORAL_SSC: [
      "Consulta con maxilofacial u otorrinolaringología.",
      "Biopsia de lesión sospechosa.",
      "Evitar tabaco y alcohol."
    ],

    ORAL_NORMAL: [
      "Mantener higiene bucal adecuada.",
      "Revisión odontológica periódica.",
      "Evitar factores irritantes."
    ],

    KIDNEY_TUMOR: [
      "Valoración con urología.",
      "Confirmar con imagen avanzada (TAC/RM).",
      "Evaluar función renal."
    ],

    KIDNEY_NORMAL: [
      "Mantener hidratación adecuada.",
      "Controlar presión arterial.",
      "Chequeo periódico si hay antecedentes."
    ],

    BRAIN_GLIOMA: [
      "Consulta urgente con neurología/neurocirugía.",
      "Confirmar con resonancia magnética.",
      "Vigilar síntomas neurológicos."
    ],

    BRAIN_TUMOR: [
      "Valoración especializada inmediata.",
      "RM con contraste.",
      "Acudir a urgencias si hay convulsiones."
    ],

    BRAIN_MENIN: [
      "Consulta con neurocirugía.",
      "Seguimiento con imagen periódica.",
      "Evaluar síntomas neurológicos."
    ],

    LYMPH_CLL: [
      "Valoración con hematología.",
      "Biometría hemática completa.",
      "Seguimiento especializado."
    ],

    LYMPH_MCL: [
      "Consulta urgente con hematología.",
      "Biopsia ganglionar.",
      "Estudios de extensión."
    ],

    LYMPH_FL: [
      "Consulta con hematología.",
      "Confirmación histopatológica.",
      "Seguimiento clínico."
    ],

    ALL_EARLY: [
      "Valoración urgente con hematología.",
      "Confirmación diagnóstica inmediata.",
      "Acudir a urgencias ante fiebre o sangrado."
    ],

    ALL_PRE: [
      "Consulta hematológica inmediata.",
      "Estudios confirmatorios.",
      "Seguimiento estrecho."
    ],

    ALL_PRO: [
      "Atención médica urgente.",
      "Estudios completos de extensión.",
      "Inicio rápido de protocolo especializado."
    ],

    ALL_BENIGN: [
      "Control clínico.",
      "Repetir estudios si es necesario.",
      "Seguimiento médico."
    ],

    CERVIX_KOC: [
      "Consulta con ginecología oncológica.",
      "Colposcopía y biopsia.",
      "Actualización de PAP y VPH."
    ],

    CERVIX_MEP: [
      "Valoración ginecológica.",
      "Seguimiento con citología.",
      "Control periódico."
    ],

    CERVIX_SFI: [
      "Consulta con ginecología.",
      "Colposcopía si se indica.",
      "Seguimiento preventivo."
    ],

    CERVIX_PAB: [
      "Evaluación ginecológica.",
      "Revisión de estudios previos.",
      "Seguimiento clínico."
    ],

    CERVIX_DYK: [
      "Valoración especializada.",
      "Confirmación con estudios cervicales.",
      "Seguimiento médico."
    ]
  };

  return MAP[L] || [
    "Se recomienda evaluación médica especializada.",
    "Confirmar con estudios complementarios.",
    "Acudir a urgencias si presenta síntomas graves."
  ];
}

/* ===== LÓGICA ===== */
if(!data){
  mainDx.textContent = "Sin resultado";
  pill.style.display = "inline-block";
  pill.style.background = "var(--warnBg)";
  pill.style.color = "var(--warn)";
  pill.textContent = "No hay datos guardados";
} else {

  mainDx.textContent = data.label;

  const conf = Number(data.confidence || 0);
  pill.style.display = "inline-flex";

  if(conf >= 0.85){
    pill.style.background = "var(--warnBg)";
    pill.style.color = "var(--warn)";
    pill.style.borderColor = "var(--warn)";
  } else {
    pill.style.background = "var(--goodBg)";
    pill.style.color = "var(--good)";
    pill.style.borderColor = "var(--good)";
  }

  pill.textContent = confidenceLabel(conf) + " — " + fmt(conf);

  const recommendations = generateRecommendations(data.label);
  recommendations.forEach(r=>{
    const li = document.createElement("li");
    li.textContent = r;
    rec.appendChild(li);
  });

  const sorted = [...(data.all || [])].sort((a,b)=>b.probability - a.probability);

  sorted.forEach((p,idx)=>{
    const row = document.createElement("div");
    row.className="row";
    row.innerHTML=`
      <div class="top">
        <span>${p.className}</span>
        <span>${fmt(p.probability)}</span>
      </div>
      <div class="barwrap">
        <div class="bar ${idx===0?'top':''}" 
             style="width:${(p.probability*100).toFixed(2)}%"></div>
      </div>
    `;
    list.appendChild(row);
  });
}
</script>

</body>
</html>
