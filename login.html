<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login | Christus Muguerza</title>

  <style>
    :root{
      --blue:#0f4c81;
      --blue2:#0b3a63;
      --teal:#1fa2a6;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e5e7eb;
      --input:#f1f5f9;
      --shadow: 0 18px 55px rgba(0,0,0,.22);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background: linear-gradient(135deg, #0b3a5a, #1fa2a6);
    }

    .box{
      width:min(620px, 100%);
      background:#fff;
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 44px 56px;
      text-align:center;
    }

    .brand{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      margin-bottom: 18px;
    }
    .brand img{
      width:54px;height:54px;
      border-radius:14px;
      object-fit:cover;
      border:1px solid #e2e8f0;
      background:#fff;
    }
    .brand h1{
      margin:0;
      font-size:22px;
      font-weight:900;
      color: var(--blue2);
      line-height:1.1;
      text-align:left;
    }
    .brand p{
      margin:4px 0 0 0;
      font-size:13px;
      color: var(--muted);
      text-align:left;
    }

    .subtitle{
      margin:18px 0 26px 0;
      color: var(--muted);
      font-size:16px;
    }

    form{
      width: min(520px, 100%);
      margin: 0 auto;
      text-align:left;
    }

    label{
      display:block;
      margin: 18px 0 8px 0;
      font-weight:800;
      font-size:14px;
      color:#0b1220;
    }

    input{
      width:100%;
      padding:14px 16px;
      border-radius: 12px;
      border: 1px solid #dde3ea;
      background: var(--input);
      outline:none;
      font-size:15px;
      color: var(--text);
      transition: .15s border, .15s box-shadow;
    }
    input:focus{
      border-color: rgba(15,76,129,.45);
      box-shadow: 0 0 0 4px rgba(15,76,129,.12);
      background:#fff;
    }

    .btn{
      width:100%;
      margin-top: 22px;
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: var(--blue);
      color:#fff;
      font-weight:900;
      font-size:16px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      box-shadow: 0 12px 26px rgba(15,76,129,.25);
      transition:.15s transform, .15s background;
    }
    .btn:hover{background: var(--blue2); transform: translateY(-1px)}
    .btn:active{transform: translateY(0px)}

    .err{
      display:none;
      margin-top: 14px;
      color:#b91c1c;
      font-weight:700;
      font-size:14px;
      text-align:center;
    }

    .back{
      display:inline-flex;
      align-items:center;
      gap:10px;
      margin-top: 26px;
      color: var(--blue2);
      text-decoration:none;
      font-weight:900;
      justify-content:center;
      width:100%;
    }
    .back:hover{ text-decoration: underline; }

    @media (max-width:520px){
      .box{padding:34px 22px}
      .brand{justify-content:flex-start}
      .brand h1,.brand p{text-align:left}
      form{text-align:left}
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="brand">
      <img src="logo.png" alt="Logo">
      <div>
        <h1>Christus Muguerza</h1>
        <p>Sistema Hospitalario</p>
      </div>
    </div>

    <div class="subtitle">Ingresa tus credenciales para acceder al sistema</div>

    <!-- ✅ Anti-autofill + evita que el navegador “recuerde” inputs -->
    <form id="loginForm" autocomplete="off">
      <label>Usuario</label>
      <input
        id="user"
        placeholder="ej. usuario"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        required
      >

      <label>Contraseña</label>
      <input
        id="password"
        type="password"
        placeholder="••••"
        autocomplete="new-password"
        required
      >

      <button class="btn" type="submit">
        <span aria-hidden="true">⟶</span>
        Ingresar
      </button>

      <div id="error" class="err"></div>
    </form>

    <a class="back" href="index.html">← Volver al inicio</a>
  </div>

  <script>
    const VALID_USER = "ricky";
    const VALID_PASS = "1234";

    const form = document.getElementById("loginForm");
    const err  = document.getElementById("error");
    const userEl = document.getElementById("user");
    const passEl = document.getElementById("password");

    // ✅ Limpia campos siempre al abrir (evita autofill / back-forward cache)
    window.addEventListener("pageshow", () => {
      userEl.value = "";
      passEl.value = "";
      err.style.display = "none";
      err.textContent = "";
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const user = userEl.value.trim();
      const pass = passEl.value.trim();

      if (user === VALID_USER && pass === VALID_PASS) {
        localStorage.setItem("loggedUser", user);
        window.location.href = "analysis.html";
      } else {
        err.style.display = "block";
        err.textContent = "Usuario o contraseña incorrectos";
      }
    });
  </script>
</body>
</html>
